<!-- REMPLACE UNIQUEMENT CES PARTIES DANS TON CODE -->

<style>
:root {
    --bg: #0b0f19;
    --surface: #121826;
    --accent: #2563eb; /* bleu pro */
    --text: #e5e7eb;
    --muted: #9ca3af;
    --border: rgba(255,255,255,0.08);
    --card-bg: rgba(255,255,255,0.03);
    --radius: 14px;
}
</style>

<!-- HERO BADGES (simplifié) -->
<div class="hero-badges">
    <span class="badge badge-blue">Python</span>
    <span class="badge badge-blue">SQL</span>
    <span class="badge badge-blue">Power BI</span>
</div>

<style>
.badge-blue {
    background: rgba(37,99,235,0.12);
    color: var(--accent);
    border: 1px solid rgba(37,99,235,0.25);
}
</style>

<!-- FILTER REMPLACÉ PAR DROPDOWN -->
<div style="margin-bottom:30px;">
    <select onchange="filterProjects(this.value)" 
        style="padding:10px 16px; border-radius:8px; background:var(--surface); color:var(--text); border:1px solid var(--border); font-size:0.9rem;">
        
        <option value="all">Tous / All</option>
        <option value="bi">BI & Analyse</option>
        <option value="ml">Machine Learning</option>
        <option value="data">Data Engineering</option>
    </select>
</div>

<script>
function filterProjects(category) {
    document.querySelectorAll('.project-card').forEach(card => {
        if (category === 'all' || card.dataset.category === category) {
            card.classList.remove('hidden');
        } else {
            card.classList.add('hidden');
        }
    });
}
</script>

<!-- CARTES PLUS SOBRES -->
<style>
.project-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: all 0.25s;
}

.project-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
}

.project-card::before {
    display: none; /* retire l’effet flashy */
}
</style>
